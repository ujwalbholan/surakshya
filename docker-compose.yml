services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: surakshya_postgres

    restart: always

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: surakshya_redis

    restart: always
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: